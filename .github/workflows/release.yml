name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build distribution zip
        run: |
          mkdir -p ./dist
          python3 .wavefoundry/framework/scripts/build_pack.py \
            --version "${{ steps.version.outputs.version }}" \
            --output ./dist

      - name: Rename asset for public download
        run: |
          cd dist
          # build_pack produces wavefoundry-X.Y.Z.<build-suffix>.zip; strip suffix for the asset name
          mv wavefoundry-${{ steps.version.outputs.version }}.*.zip \
             wavefoundry-${{ steps.version.outputs.version }}.zip
          ls -la

      - name: Extract release notes from CHANGELOG
        run: |
          awk '/^## \[${{ steps.version.outputs.version }}\]/{flag=1; next} /^## \[/{flag=0} flag' \
            CHANGELOG.md > release-notes.md
          echo "--- release notes preview ---"
          head -20 release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: dist/wavefoundry-${{ steps.version.outputs.version }}.zip
          fail_on_unmatched_files: true
