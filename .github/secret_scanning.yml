# GitHub secret scanning / push-protection configuration.
#
# Wavefoundry is a secrets-DETECTION framework: its test suite intentionally
# contains synthetic secret fixtures (Stripe/Adobe/AWS-style keys, PEM blocks,
# etc. — e.g. test_secrets_validators.py, test_server_tools.py) so the detectors
# can be verified to fire. These are NOT real credentials, but GitHub's partner
# pattern push protection flags them and blocks pushes/releases.
#
# Exclude the framework test tree so the detector's own test vectors don't block
# pushes. Real-secret protection is unaffected: the framework's own scan_secrets
# runs over the source tree and the wf_close_wave secrets gate enforces
# classification (pending/suspected/confirmed) before any wave can close.
paths-ignore:
  - ".wavefoundry/framework/scripts/tests/**"
